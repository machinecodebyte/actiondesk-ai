services:
  postgres:
    image: postgres:16-alpine
    container_name: actiondesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-actiondesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-actiondesk_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-actiondesk_ai}
    ports:
      - "${POSTGRES_PORT:-55450}:5432"
    volumes:
      - actiondesk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-actiondesk} -d ${POSTGRES_DB:-actiondesk_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: actiondesk-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6390}:6379"
    volumes:
      - actiondesk-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

